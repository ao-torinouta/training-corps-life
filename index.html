<!DOCTYPE html>
<html lang="ja">
<head>

<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="教育隊生活">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <title>教育隊生活 v0.1</title>
  <style>
    :root {
      --bg: #050a12;
      --panel: #0b1625;
      --panel-2: #102238;
      --line: #24415f;
      --text: #eef6ff;
      --muted: #9db2c8;
      --blue: #3e8ed0;
      --blue-2: #72b7f2;
      --ok: #7bc49b;
      --warn: #e7b86e;
      --shadow: 0 18px 50px rgba(0, 0, 0, .38);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(37, 91, 139, .22), transparent 36%),
        linear-gradient(180deg, #07111f 0%, var(--bg) 60%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: max(22px, env(safe-area-inset-top))
               max(18px, env(safe-area-inset-right))
               max(28px, env(safe-area-inset-bottom))
               max(18px, env(safe-area-inset-left));
    }

    .app {
      width: min(100%, 480px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--blue-2);
      font-size: .78rem;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 20px;
      font-size: clamp(1.45rem, 5vw, 2rem);
      letter-spacing: .06em;
    }

    .board {
      overflow: hidden;
      border: 1px solid rgba(114, 183, 242, .25);
      border-radius: 24px;
      background: rgba(11, 22, 37, .92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .section {
      padding: 24px;
    }

    .section + .section {
      border-top: 1px solid var(--line);
    }

    .label {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: .82rem;
      letter-spacing: .12em;
    }

    .clock {
      font-variant-numeric: tabular-nums;
      font-size: clamp(2.8rem, 14vw, 4.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: .02em;
    }

    .date {
      margin-top: 10px;
      color: var(--muted);
      font-size: .92rem;
    }

    .current {
      background: linear-gradient(135deg, rgba(35, 83, 126, .42), rgba(11, 22, 37, .25));
    }

    .subject {
      font-size: clamp(1.9rem, 8vw, 2.7rem);
      font-weight: 700;
      letter-spacing: .05em;
    }

    .subject-sub {
      margin-top: 9px;
      color: var(--blue-2);
      font-size: .95rem;
    }

    .next-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
    }

    .next-name {
      font-size: 1.25rem;
      font-weight: 650;
    }

    .next-time {
      color: var(--blue-2);
      font-size: 1.35rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .officer {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 14px;
      align-items: center;
    }

    .face {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #08111d;
      font-size: 1.8rem;
    }

    .quote {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.7;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #0c1b2d;
      color: var(--text);
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: translateY(1px);
    }

    button.primary {
      border-color: rgba(114, 183, 242, .65);
      background: var(--blue);
      color: #04101c;
    }

    .status {
      min-height: 1.5em;
      margin: 14px 3px 0;
      color: var(--muted);
      font-size: .9rem;
      text-align: center;
    }

    .footnote {
      margin: 14px 3px 0;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.6;
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(1, 5, 10, .88);
      backdrop-filter: blur(10px);
    }

    .modal[hidden] { display: none; }

    .modal-card {
      width: min(100%, 430px);
      padding: 28px;
      border: 1px solid rgba(114, 183, 242, .35);
      border-radius: 24px;
      background: #091523;
      box-shadow: var(--shadow);
    }

    .modal-face {
      margin-bottom: 16px;
      font-size: 2.2rem;
    }

    .modal-card p {
      margin: 0 0 12px;
      font-size: 1.08rem;
      line-height: 1.8;
    }

    .modal-card button {
      width: 100%;
      margin-top: 12px;
    }

    @media (max-width: 380px) {
      .section { padding: 20px; }
      .actions { grid-template-columns: 1fr; }
      .officer { grid-template-columns: 50px 1fr; }
      .face { width: 50px; height: 50px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <p class="eyebrow">Training Corps Life</p>
    <h1>教育隊生活 <small style="font-size:.55em;color:#9db2c8">v0.1</small></h1>

    <section class="board" aria-label="現在の生活課目">
      <div class="section">
        <div class="label">現在時刻</div>
        <div class="clock" id="clock">--:--</div>
        <div class="date" id="date">----</div>
      </div>

      <div class="section current">
        <div class="label">現在課目</div>
        <div class="subject" id="currentSubject">確認中</div>
        <div class="subject-sub" id="currentRange">--:-- — --:--</div>
      </div>

      <div class="section">
        <div class="label">次課目</div>
        <div class="next-row">
          <div class="next-name" id="nextSubject">確認中</div>
          <div class="next-time" id="nextTime">--:--</div>
        </div>
      </div>

      <div class="section">
        <div class="officer">
          <div class="face" aria-hidden="true">📋🪨😐</div>
          <p class="quote" id="quote">「現在課目を確認する。」</p>
        </div>

        <div class="actions">
          <button type="button" id="startBtn" class="primary">課目開始</button>
          <button type="button" id="completeBtn">課目完了</button>
          <button type="button" id="extendBtn">10分延長</button>
        </div>

        <p class="status" id="status" aria-live="polite"></p>
      </div>
    </section>

    <p class="footnote">
      この試作版は、画面を開いた時に現在課目を示します。<br>
      バックグラウンドでの時刻通知は、HTML単体では未対応です。
    </p>
  </main>

  <div class="modal" id="introModal" hidden>
    <div class="modal-card">
      <div class="modal-face" aria-hidden="true">📋🪨😐</div>
      <p>「……新入隊員か。」</p>
      <p>「規則は守ってもらう。」</p>
      <p>「もっとも、規則はお前を縛るためではない。生活を整えるためのものだ。」</p>
      <p>「今日から教育を開始する。」</p>
      <button type="button" class="primary" id="enlistBtn">入隊する</button>
    </div>
  </div>

  <script>
    const baseSchedule = [
      { start: "00:00", name: "消灯・休養" },
      { start: "06:00", name: "起床" },
      { start: "06:30", name: "朝食・補給" },
      { start: "07:45", name: "出発・移動" },
      { start: "08:30", name: "勤務" },
      { start: "12:00", name: "昼食・休憩" },
      { start: "13:00", name: "勤務" },
      { start: "17:30", name: "帰投・整理" },
      { start: "18:00", name: "夕食・補給" },
      { start: "21:00", name: "入浴・整備" },
      { start: "22:00", name: "自由・創作" },
      { start: "23:30", name: "消灯・休養" }
    ];

    const clockEl = document.getElementById("clock");
    const dateEl = document.getElementById("date");
    const currentSubjectEl = document.getElementById("currentSubject");
    const currentRangeEl = document.getElementById("currentRange");
    const nextSubjectEl = document.getElementById("nextSubject");
    const nextTimeEl = document.getElementById("nextTime");
    const quoteEl = document.getElementById("quote");
    const statusEl = document.getElementById("status");

    let extensionMinutes = 0;
    let lastCurrentIndex = -1;

    function toMinutes(time) {
      const [hour, minute] = time.split(":").map(Number);
      return hour * 60 + minute;
    }

    function formatTime(totalMinutes) {
      const normalized = ((totalMinutes % 1440) + 1440) % 1440;
      const hour = Math.floor(normalized / 60);
      const minute = normalized % 60;
      return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
    }

    function getSchedule() {
      return baseSchedule.map((item, index) => ({
        ...item,
        minutes: toMinutes(item.start) + (index > lastCurrentIndex ? extensionMinutes : 0)
      }));
    }

    function getCurrentInfo(now) {
      const minutesNow = now.getHours() * 60 + now.getMinutes();
      const schedule = baseSchedule.map(item => ({
        ...item,
        minutes: toMinutes(item.start)
      }));

      let currentIndex = schedule.length - 1;
      for (let i = 0; i < schedule.length; i++) {
        if (minutesNow >= schedule[i].minutes) currentIndex = i;
      }

      const current = schedule[currentIndex];
      const nextIndex = (currentIndex + 1) % schedule.length;
      const next = schedule[nextIndex];

      return { currentIndex, current, nextIndex, next };
    }

    function updateScreen() {
      const now = new Date();
      const info = getCurrentInfo(now);
      lastCurrentIndex = info.currentIndex;

      const currentStart = toMinutes(info.current.start);
      let nextStart = toMinutes(info.next.start);

      if (info.nextIndex === 0) nextStart = 1440;
      nextStart += extensionMinutes;

      clockEl.textContent = now.toLocaleTimeString("ja-JP", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });

      dateEl.textContent = now.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "short"
      });

      currentSubjectEl.textContent = info.current.name;
      currentRangeEl.textContent =
        `${formatTime(currentStart)} — ${formatTime(nextStart)}`;
      nextSubjectEl.textContent = info.next.name;
      nextTimeEl.textContent = formatTime(nextStart);

      quoteEl.textContent = `「現在課目：${shortName(info.current.name)}。」`;
    }

    function shortName(name) {
      return name.split("・")[0];
    }

    function setStatus(message) {
      statusEl.textContent = message;
      window.clearTimeout(setStatus.timer);
      setStatus.timer = window.setTimeout(() => {
        statusEl.textContent = "";
      }, 3500);
    }

    document.getElementById("startBtn").addEventListener("click", () => {
      const subject = currentSubjectEl.textContent;
      quoteEl.textContent = `「${shortName(subject)}を開始しろ。」`;
      setStatus(`${subject}を開始しました。`);
    });

    document.getElementById("completeBtn").addEventListener("click", () => {
      const subject = currentSubjectEl.textContent;
      quoteEl.textContent = "「確認した。次の課目に備えろ。」";
      setStatus(`${subject}を完了しました。`);
    });

    document.getElementById("extendBtn").addEventListener("click", () => {
      extensionMinutes += 10;
      quoteEl.textContent = "「10分延長を認める。終了時刻は意識しろ。」";
      setStatus("次課目を10分延長しました。");
      updateScreen();
    });

    const introModal = document.getElementById("introModal");
    const enlistBtn = document.getElementById("enlistBtn");

    try {
      if (!localStorage.getItem("trainingCorpsEnlisted")) {
        introModal.hidden = false;
      }
    } catch (error) {
      introModal.hidden = false;
    }

    enlistBtn.addEventListener("click", () => {
      try {
        localStorage.setItem("trainingCorpsEnlisted", "yes");
      } catch (error) {
        // 保存できない環境でも、その場では閉じる
      }
      introModal.hidden = true;
      setStatus("入隊を確認しました。");
    });

    updateScreen();
    window.setInterval(updateScreen, 1000);
  </script>
</body>
</html>
